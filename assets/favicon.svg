<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="15" fill="#1a1a2e"/>
  <!-- Devil horns -->
  <path d="M25 35 L15 10 L35 28 Z" fill="#e94560"/>
  <path d="M75 35 L85 10 L65 28 Z" fill="#e94560"/>
  <!-- Devil face circle -->
  <circle cx="50" cy="52" r="28" fill="#e94560"/>
  <!-- Eyes -->
  <ellipse cx="40" cy="47" rx="5" ry="6" fill="#1a1a2e"/>
  <ellipse cx="60" cy="47" rx="5" ry="6" fill="#1a1a2e"/>
  <!-- Evil grin -->
  <path d="M34 62 Q50 74 66 62" stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Small fangs -->
  <line x1="43" y1="64" x2="43" y2="70" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="57" y1="64" x2="57" y2="70" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M78 65 Q90 70 88 82 Q86 90 78 85 Q72 80 80 75" stroke="#e94560" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
